/**:
  ros__parameters:
    image_transport: raw
    family: 36h11
    # Global tag edge size in meters. Overridden at launch via `tag_size_mm`.
    # Recommended: 80 mm (0.080) for the moving tag — robust to ~30° tilt and
    # motion blur at 30 fps from ~1.6 m; 64 mm is acceptable for a fixed tag.
    size: 0.064
    max_hamming: 0
    qos_profile: sensor_data
    # Detector tuned for D435i @ 1920x1080, 2m x 1m plane viewed from ~1.6 m.
    # At that distance a 64 mm tag occupies ~56 px on the sensor; decimation
    # would push it below the reliable detection threshold for the 36h11
    # family, so we run the quad detector at full resolution.
    detector:
      threads: 4
      decimate: 1.0
      blur: 0.0
      refine: true
      sharpening: 0.25
      debug: false
    pose_estimation_method: "pnp"
    tag:
      ids: [20, 5]
      frames: [tag_20, tag_5]
